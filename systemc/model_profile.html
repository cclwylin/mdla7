<!doctype html>
<html>

<title>MDLA7 Model Profiles</title>
<style>
:root {
  color-scheme: light;
  --bg:#f7f8fa; --panel:#ffffff; --line:#d8dde6; --text:#17202a;
  --muted:#657080; --head:#eef2f7; --link:#0b5cad;
}
body { margin:0; font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       color:var(--text); background:var(--bg); }
main { max-width:1180px; margin:0 auto; padding:24px; }
h1 { margin:0 0 12px; font-size:24px; }
.bar { display:flex; align-items:center; gap:10px; margin:0 0 14px; flex-wrap:wrap; }
button { border:1px solid var(--line); background:#fff; padding:6px 10px; border-radius:6px;
         cursor:pointer; }
input { border:1px solid var(--line); border-radius:6px; padding:7px 9px; min-width:240px; }
.meta { color:var(--muted); }
table { width:100%; border-collapse:collapse; background:var(--panel);
        border:1px solid var(--line); }
th,td { padding:8px 10px; border-bottom:1px solid var(--line); text-align:left; }
th { background:var(--head); position:sticky; top:0; z-index:1; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
a { color:var(--link); text-decoration:none; }
a:hover { text-decoration:underline; }
tr:hover td { background:#f4f7fb; }
</style>
</head>

":"vsr_quant","stem":"vsr_quant","link":"output/vsr_quant.html","cx":"0.77","our_ms":1.5,"ratio":1.948051948051948},{"pattern":"mv3_depth_float","stem":"mv3_depth_float","link":"output/mv3_depth_float.html","cx":"1.59","our_ms":3.051,"ratio":1.9188679245283018},{"pattern":"sd_encoder_quant","stem":"sd_encoder_quant","link":"output/sd_encoder_quant.html","cx":"3.22","our_ms":6.118,"ratio":1.9},{"pattern":"srgan_quant","stem":"srgan_quant","link":"output/srgan_quant.html","cx":"3.4","our_ms":6.01,"ratio":1.7676470588235293},{"pattern":"llama2_quant.cut","stem":"llama2_quant","link":"output/llama2_quant.html","cx":"0.71","our_ms":1.252,"ratio":1.763380281690141},{"pattern":"sd_decoder_quant","stem":"sd_decoder_quant","link":"output/sd_decoder_quant.html","cx":"6.53","our_ms":11.21,"ratio":1.7166921898928025},{"pattern":"inception_v3_quant","stem":"inception_v3_quant","link":"output/inception_v3_quant.html","cx":"0.62","our_ms":1.009,"ratio":1.6274193548387095},{"pattern":"imdn_quant","stem":"imdn_quant","link":"output/imdn_quant.html","cx":"2.46","our_ms":3.856,"ratio":1.5674796747967479},{"pattern":"pynet_v2_quant","stem":"pynet_v2_quant","link":"output/pynet_v2_quant.html","cx":"9.2","our_ms":14.134,"ratio":1.5363043478260872},{"pattern":"inception_v3_float","stem":"inception_v3_float","link":"output/inception_v3_float.html","cx":"1.56","our_ms":2.231,"ratio":1.430128205128205},{"pattern":"sam_quant.cut","stem":"sam_quant","link":"output/sam_quant.html","cx":"2.03","our_ms":2.749,"ratio":1.3541871921182267},{"pattern":"microisp_float","stem":"microisp_float","link":"output/microisp_float.html","cx":"8.39","our_ms":11.301,"ratio":1.3469606674612633},{"pattern":"swin_quant","stem":"swin_quant","link":"output/swin_quant.html","cx":"1.0","our_ms":1.274,"ratio":1.274},{"pattern":"esrgan__int16","stem":"esrgan_int16","link":"output/esrgan_int16.html","cx":"3.05","our_ms":3.786,"ratio":1.2413114754098362},{"pattern":"mobilenet_v3_b4_float","stem":"mobilenet_v3_b4_float","link":"output/mobilenet_v3_b4_float.html","cx":"2.13","our_ms":2.535,"ratio":1.1901408450704227},{"pattern":"dped_quant","stem":"dped_quant","link":"output/dped_quant.html","cx":"23.27","our_ms":26.121,"ratio":1.1225182638590459},{"pattern":"microisp_quant","stem":"microisp_quant","link":"output/microisp_quant.html","cx":"5.42","our_ms":5.862,"ratio":1.081549815498155},{"pattern":"mobilenet_v3_b4_quant","stem":"mobilenet_v3_b4_quant","link":"output/mobilenet_v3_b4_quant.html","cx":"0.77","our_ms":0.802,"ratio":1.0415584415584416},{"pattern":"vsr_float","stem":"vsr_float","link":"output/vsr_float.html","cx":"2.37","our_ms":1.92,"ratio":0.810126582278481},{"pattern":"resnet_float","stem":"resnet_float","link":"output/resnet_float.html","cx":"0.02","our_ms":0.014,"ratio":0.7},{"pattern":"microisp_int16","stem":"microisp_int16","link":"output/microisp_int16.html","cx":"7.11","our_ms":4.898,"ratio":0.6888888888888888},{"pattern":"resnet_quant","stem":"resnet_quant","link":"output/resnet_quant.html","cx":"0.02","our_ms":0.007,"ratio":0.35},{"pattern":"unet_int16","stem":"unet_int16","link":"output/unet_int16.html","cx":"3.39","our_ms":1.111,"ratio":0.32772861356932154}];
let rows = EMBEDDED_ROWS.slice();

function fmtMs(v) {
  if (v === null || v === undefined || v === "") return "";
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(3) : String(v);
}
function ratioOf(r) {
  if (r.ratio !== null && r.ratio !== undefined && r.ratio !== "") {
    const n = Number(r.ratio);
    if (Number.isFinite(n)) return n;
  }
  const ms = Number(r.our_ms), cx = Number(r.cx);
  return Number.isFinite(ms) && Number.isFinite(cx) && cx > 0 ? ms / cx : null;
}
function fmtRatio(r) {
  const n = ratioOf(r);
  return n === null ? "" : n.toFixed(2);
}
function sortRows(xs) {
  xs.sort((a,b) => {
    const ar = ratioOf(a), br = ratioOf(b);
    if (ar !== null && br !== null && ar !== br) return br - ar;
    if (ar !== null && br === null) return -1;
    if (ar === null && br !== null) return 1;
    return String(a.pattern).localeCompare(String(b.pattern));
  });
  return xs;
}
function render() {
  const q = document.getElementById("filter").value.trim().toLowerCase();
  const body = document.getElementById("rows");
  body.innerHTML = "";
  for (const r of sortRows(rows.slice())) {
    if (q && !String(r.pattern).toLowerCase().includes(q)) continue;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${esc(r.pattern)}</td>` +
      `<td><a href="${escAttr(r.link)}">${esc(r.stem || r.pattern)}</a></td>` +
      `<td class="num">${esc(r.cx || "")}</td>` +
      `<td class="num">${esc(fmtMs(r.our_ms))}</td>` +
      `<td class="num">${esc(fmtRatio(r))}</td>`;
    body.appendChild(tr);
  }
  document.getElementById("status").textContent =
    `${body.children.length} / ${rows.length} profiles`;
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function escAttr(s) { return esc(s); }
function csvParse(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return {};
  const hdr = lines[0].split(",");
  const out = {};
  for (const ln of lines.slice(1)) {
    const cols = ln.split(",");
    const row = Object.fromEntries(hdr.map((h,i) => [h, cols[i] || ""]));
    const pat = row.pattern || row.Pattern || "";
    const stem = pat.endsWith(".cut") ? pat.slice(0, -4) : pat.replaceAll("__", "_");
    if (stem) out[stem] = {
      pattern: pat,
      cx: row.mdla6_cx || row.CX || "",
      ms: row.mdla7_ms || ""
    };
  }
  return out;
}
async function refreshFromOutput() {
  const status = document.getElementById("status");
  try {
    status.textContent = "checking output/ ...";
    const [dirText, csvText] = await Promise.all([
      fetch("output/").then(r => r.text()),
      fetch("output/mdla6_pattern_regression.csv").then(r => r.ok ? r.text() : "").catch(() => "")
    ]);
    const cx = csvParse(csvText);
    const doc = new DOMParser().parseFromString(dirText, "text/html");
    const names = [...doc.querySelectorAll("a")]
      .map(a => a.getAttribute("href") || "")
      .map(h => decodeURIComponent(h.split("/").pop()))
      .filter(n => n && n.endsWith(".html") && n !== "model_profile.html" && !n.startsWith("._"));
    const next = [];
    for (const name of names) {
      const stem = name.replace(/\.html$/, "");
      let ms = cx[stem] && cx[stem].ms ? Number(cx[stem].ms) : null;
      try {
        const p = await fetch(`output/${stem}.profile.json`);
        if (p.ok) {
          const j = await p.json();
          if (ms === null && j.summary && j.summary.total_cycles !== undefined)
            ms = Number(j.summary.total_cycles) / 1.9e6;
        }
      } catch (_) {}
      next.push({
        pattern: (cx[stem] && cx[stem].pattern) || stem,
        stem, link: `output/${name}`,
        cx: (cx[stem] && cx[stem].cx) || "",
        our_ms: ms,
        ratio: null
      });
    }
    if (next.length) rows = next;
    render();
  } catch (e) {
    status.textContent = `using embedded snapshot; serve systemc/ over HTTP for live output scan`;
    render();
  }
}
document.getElementById("refresh").addEventListener("click", refreshFromOutput);
document.getElementById("filter").addEventListener("input", render);
render();
refreshFromOutput();
</script>
